version: '3.9'
services:
  # PostgreSQL service intentionally omitted: backend uses SQLite for local prototype.
  backend:
    build: ./backend
    volumes:
      - ./backend:/app
    ports: ["8000:8000"]

  frontend:
    build: ./frontend
    depends_on: [backend]
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports: ["5173:5173"]
