version: '3.9'
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: discovery
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    depends_on: [db]
    volumes:
      - ./backend:/app
    ports: ["8000:8000"]

  frontend:
    build: ./frontend
    depends_on: [backend]
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports: ["5173:5173"]

volumes:
  pgdata:
